spring:
  application:
    name: rag
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  ai:
    openai:
      api-key: //your api key
      base-url: https://integrate.api.nvidia.com
      chat:
        options:
          model: moonshotai/kimi-k2-instruct
      embedding:
        enabled: false # Disable OpenAI embeddings as we use the local transformers
